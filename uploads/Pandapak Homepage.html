<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PandaPak — Homepage Redesign Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #0a6c3d;
    --green-deep: #075a31;
    --green-soft: #e8f1ec;
    --amber: #f59e0b;
    --ink: #0F1A14;
    --paper: #ffffff;
    --paper-tint: #f4f7f5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: #fff;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .container { max-width: 1320px; margin: 0 auto; }
  button { font-family: inherit; }
  a { color: inherit; }
  ::selection { background: var(--green); color: #fff; }
  /* hide scrollbar in strategy panel for cleanliness */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,26,20,0.15); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="strategy.jsx"></script>

</body>
</html>
